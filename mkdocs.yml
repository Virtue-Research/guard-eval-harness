site_name: Guard Eval Harness
site_description: Lightweight harness for evaluating safety guards
site_url: https://virtue-research.github.io/guard-eval-harness/
repo_url: https://github.com/Virtue-Research/guard-eval-harness
repo_name: Virtue-Research/guard-eval-harness

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Troubleshooting: getting-started/troubleshooting.md
  - User Guide:
      - Configuration: user-guide/configuration.md
      - Benchmark Selection: user-guide/benchmark-selection.md
      - Run Artifacts: user-guide/run-artifacts.md
      - Resuming Runs: user-guide/resume.md
      - Common Workflows: user-guide/common-workflows.md
  - Guards: guards/overview.md
  - Backends: backends/overview.md
  - Datasets:
      - Overview: datasets/overview.md
      - Text Benchmarks: datasets/text.md
      - Image Benchmarks: datasets/image.md
      - Local Data: datasets/local.md
  - CLI Reference: cli/reference.md
  - Metrics: metrics/overview.md
  - Developer Guide:
      - Architecture: developer/architecture.md
      - Adding a Dataset: developer/adding-datasets.md
      - Adding a Guard: developer/adding-guards.md
      - Adding a Backend: developer/adding-backends.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Virtue-Research/guard-eval-harness
