name: Release

# Publishes geh to PyPI (or TestPyPI for pre-releases) whenever a GitHub
# Release is published. The version is derived from the git tag by
# setuptools_scm — there is no version field to bump in pyproject.toml.
#
# Routing:
#   - GitHub Release marked as "pre-release" -> publishes to TestPyPI
#   - GitHub Release not marked as pre-release -> publishes to PyPI
#
# Auth: PyPI Trusted Publishing (OIDC). No tokens are stored in this repo.
# A one-time Trusted Publisher must be configured for each project on
# pypi.org and test.pypi.org pointing at this workflow + the `pypi` /
# `testpypi` environments below.

on:
  release:
    types: [published]
  # Lets you dry-run the build job manually from the Actions tab without
  # publishing anything.
  workflow_dispatch:

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # setuptools_scm needs the full history (or at least the tag) to
          # compute the version. A shallow clone would resolve to 0.0.0.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Show built artifacts
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish-testpypi:
    name: Publish to TestPyPI
    # Only on pre-release GitHub Releases. Skipped on workflow_dispatch.
    if: github.event_name == 'release' && github.event.release.prerelease == true
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/project/geh/
    permissions:
      # Required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # If you ever re-run the workflow on an existing release, don't
          # fail just because TestPyPI already has the files.
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    # Only on stable (non-pre-release) GitHub Releases.
    if: github.event_name == 'release' && github.event.release.prerelease == false
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/geh/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
