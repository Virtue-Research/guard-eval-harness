adapter: hf
model_name: lmsys/toxicchat-t5-large-v1.0
args:
  device: -1
  task: text2text-generation
  tokenizer: t5-large
  max_length: 512
  prompt_template: "ToxicChat: {messages_text}"
  text_score_mapping:
    positive: 1.0
    negative: 0.0
  generation_kwargs:
    max_new_tokens: 8
    do_sample: false
