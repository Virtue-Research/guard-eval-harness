version: 1
run_name: openai-compatible-local-image-jsonl
threshold: 0.5
model:
  adapter: openai_compatible
  model_name: ${OPENAI_VISION_MODEL}
  args:
    api_key_env: OPENAI_API_KEY
    root_url: https://api.openai.com
    temperature: 0.0
    max_tokens: 32
datasets:
  - name: local_image_jsonl
    adapter: local_image_jsonl
    path: ${LOCAL_IMAGE_JSONL_PATH}
    split: test
output:
  run_dir: out/openai-compatible-local-image-jsonl
execution:
  batch_size: 4
  concurrency: 4
  retries: 2
