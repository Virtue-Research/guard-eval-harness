version: 1
run_name: local-audio-jsonl
threshold: 0.5
model:
  adapter: hf_audio_guard
  model_name: Qwen/Qwen2-Audio-7B-Instruct
  args:
    device: 1
    torch_dtype: bfloat16
    max_new_tokens: 128
datasets:
  - name: local_audio_jsonl
    adapter: local_audio_jsonl
    path: datasets/audio_samples.jsonl
    split: test
output:
  run_dir: out/local-audio-jsonl
execution:
  batch_size: 1
  concurrency: 1
  retries: 0
