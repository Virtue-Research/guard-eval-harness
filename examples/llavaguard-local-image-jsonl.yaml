version: 1
run_name: llavaguard-local-image-jsonl
threshold: 0.5
model:
  adapter: hf_vlm_guard
  model_name: AIML-TUDA/LlavaGuard-v1.2-0.5B-OV-hf
  args:
    flow: llavaguard
    device_map: auto
    torch_dtype: bfloat16
    max_new_tokens: 200
    emit_categories: true
datasets:
  - name: local_image_jsonl
    adapter: local_image_jsonl
    path: datasets/local_images.jsonl
    split: test
output:
  run_dir: out/llavaguard-local-image-jsonl
execution:
  batch_size: 2
  concurrency: 1
  retries: 0
