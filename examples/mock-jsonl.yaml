version: 2
run_name: mock-demo
threshold: 0.5

model:
  guard: llm
  output_format: safe_unsafe_first_line
  backend:
    kind: mock

datasets:
  - name: mock_full
    adapter: local_jsonl
    path: datasets/mock_samples.jsonl
    policy: general_safety
  - name: mock_first_4
    adapter: local_jsonl
    path: datasets/mock_samples.jsonl
    limit: 4
    policy: general_safety

output:
  run_dir: ../out/mock-demo
  resume: true
